<!DOCTYPE html>
<html>
<head>
  <title>Dream Big Animation</title>
  <style>
    body { margin:0; background:black; }
    .scene { position:relative; width:100%; height:400px; overflow:hidden; }
    .student {
      width:50px; height:100px; background:blue;
      position:absolute; bottom:0; left:20px;
      animation: walk 12s linear forwards;
    }
    .stars {
      position:absolute; top:0; width:100%; height:100%;
      background: radial-gradient(white, transparent) repeat;
      background-size: 50px 50px;
      animation: twinkle 2s infinite alternate;
    }
    .text {
      position:absolute; top:20px; width:100%;
      text-align:center; font-size:24px; font-family:sans-serif;
      color:white; text-shadow:2px 2px 4px black;
    }
    @keyframes walk {
      from { left:20px; }
      to { left:80%; bottom:200px; }
    }
    @keyframes twinkle {
      from { opacity:0.6; }
      to { opacity:1; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="stars"></div>
    <div class="text" id="narration">Your dreams are the map to your future.</div>
    <div class="student"></div>
  </div>
</body>
</html>
