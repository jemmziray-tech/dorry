<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Dorcas ❤️</title>

<!-- Handwritten Font -->
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  background: radial-gradient(circle at top, #1b2735, #090a0f);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: 'Patrick Hand', cursive;
  color:#fff;
  text-align:center;
  padding:20px;
  touch-action:none;
}

/* Floating hearts / dandelions */
.particle {
  position:absolute;
  font-size:16px;
  color:rgba(255,182,193,0.9);
  animation: floatUp linear forwards;
  user-select:none;
}
@keyframes floatUp {
  from { transform: translateY(0) scale(0.6); opacity:1; }
  to { transform: translateY(-120vh) scale(1.3); opacity:0; }
}

/* Sparkles */
.sparkle {
  position:absolute;
  width:6px; height:6px;
  background:white;
  border-radius:50%;
  opacity:0.8;
  animation: sparkleAnim linear forwards;
}
@keyframes sparkleAnim {
  0% { transform: translateY(0) scale(0.5); opacity:1; }
  100% { transform: translateY(-150px) scale(1.2); opacity:0; }
}

/* Box */
.box-container { z-index:3; cursor:pointer; margin-bottom:20px; }
.box { width:140px; height:140px; background:#b11226; border-radius:12px; position:relative; box-shadow:0 0 25px rgba(255,0,80,0.6); }
.lid { width:150px; height:40px; background:#e63946; border-radius:12px 12px 0 0; position:absolute; top:-40px; left:-5px; transform-origin:bottom center; transition: transform 1s ease; }
.box.open .lid { transform: rotateX(120deg); }

/* Letter */
.letter {
  position:absolute;
  width:90%; max-width:300px;
  background:#fff; color:#333;
  padding:20px; border-radius:10px;
  top:20px; left:50%;
  transform: translateX(-50%) translateY(0) scale(0);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  text-align:center;
  transition: transform 1s ease;
}
.box.open .letter { animation: popOut 1s forwards; }
@keyframes popOut {
  0% { transform: translateX(-50%) translateY(0) scale(0); }
  60% { transform: translateX(-50%) translateY(-180px) scale(1.1); }
  80% { transform: translateX(-50%) translateY(-160px) scale(0.95); }
  100% { transform: translateX(-50%) translateY(-170px) scale(1); }
}
.letter h2 { color:#e63946; margin-bottom:15px; }
.fade-line { opacity:0; transform:translateY(10px); animation:fadeInLine 1s forwards; }
@keyframes fadeInLine { to { opacity:1; transform:translateY(0); } }

.tap { margin-top:20px; font-size:0.9rem; color:#ccc; animation:pulse 2s infinite; }

/* Photo Reveal */
.photo-container { position:relative; width:250px; height:250px; margin:30px auto; cursor:pointer; z-index:3; }
.photo-cover { position:absolute; width:100%; height:100%; background:#b11226; color:#fff; display:flex; justify-content:center; align-items:center; border-radius:12px; font-size:1.1rem; text-align:center; transition: transform 1s ease, opacity 1s ease; }
.hidden-photo { width:100%; height:100%; border-radius:12px; object-fit:cover; opacity:0; transform:scale(0.8); transition:opacity 1s ease, transform 1s ease; }
.photo-container.open .photo-cover { transform:translateY(-260px); opacity:0; }
.photo-container.open .hidden-photo { opacity:1; transform:scale(1); }

</style>
</head>

<body>

<!-- Surprise Box -->
<div class="box-container" onclick="openBox()">
  <div class="box" id="box">
    <div class="lid"></div>
    <div class="letter" id="letter">
      <h2>My Love ❤️</h2>
      <p>
        <span class="fade-line" style="animation-delay:0.2s;">I love you, Dorcas Kutimwa.</span><br>
        <span class="fade-line" style="animation-delay:0.6s;">You make my life brighter every day.</span><br>
        <span class="fade-line" style="animation-delay:1s;">Thank you for being my joy and comfort.</span><br>
        <span class="fade-line" style="animation-delay:1.4s;">I’m so grateful for every moment with you.</span>
      </p>
    </div>
  </div>
  <div class="tap">Tap the box 🎁</div>
</div>

<!-- Photo Reveal -->
<div class="photo-container" onclick="revealPhoto()">
  <div class="photo-cover">Tap to see our photo 📸</div>
  <img src="your-photo.jpg" alt="Us" class="hidden-photo">
</div>

<!-- Music -->
<audio id="music" loop>
  <source src="dandelions.mp3" type="audio/mpeg">
</audio>

<script>
  // Floating particles
  function createParticle() {
    const p=document.createElement('div');
    p.className='particle';
    p.innerHTML='❤️';
    p.style.left=Math.random()*100+'vw';
    p.style.fontSize=Math.random()*18+12+'px';
    p.style.animationDuration=Math.random()*3+5+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),8000);
  }
  setInterval(createParticle,350);

  // Floating sparkles
  function createSparkle() {
    const s=document.createElement('div');
    s.className='sparkle';
    s.style.left=Math.random()*100+'vw';
    s.style.top=Math.random()*80+'vh';
    s.style.animationDuration=(Math.random()*2+1)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),3000);
  }
  setInterval(createSparkle,200);

  // Finger trail sparkles with interactive aura
  function createTrail(x,y,intensity=1) {
    for(let i=0;i<intensity;i++){
      const t=document.createElement('div');
      t.className='sparkle';
      t.style.left=(x + (Math.random()-0.5)*30)+'px';
      t.style.top=(y + (Math.random()-0.5)*30)+'px';
      t.style.width=4+'px';
      t.style.height=4+'px';
      t.style.background='pink';
      t.style.opacity=0.8;
      t.style.animationDuration='0.8s';
      document.body.appendChild(t);
      setTimeout(()=>t.remove(),800);
    }
  }

  function handlePointerMove(e){
    let points = [];
    if(e.touches){
      for(let t of e.touches) points.push({x:t.clientX, y:t.clientY});
    } else points.push({x:e.clientX, y:e.clientY});
    
    points.forEach(pt=>{
      const element = document.elementFromPoint(pt.x, pt.y);
      // If pointer is over letter or photo, make more sparkles
      if(element.closest('.letter') || element.closest('.photo-container')){
        createTrail(pt.x, pt.y, 5);
      } else {
        createTrail(pt.x, pt.y, 1);
      }
    });
  }

  document.addEventListener('mousemove', handlePointerMove);
  document.addEventListener('touchmove', handlePointerMove);

  // Open box + play music
  function openBox() {
    document.getElementById('box').classList.add('open');
    document.getElementById('music').play();

    const lines=document.querySelectorAll('.fade-line');
    lines.forEach(line=>line.style.animationPlayState='running');
  }

  // Photo reveal
  function revealPhoto() {
    document.querySelector('.photo-container').classList.add('open');
  }
</script>

</body>
</html>
