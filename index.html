<!DOCTYPE html>
<html>
<head>
  <title>Student Coming from School</title>
  <style>
    body { margin: 0; background: skyblue; }
    .scene { position: relative; width: 100%; height: 400px; overflow: hidden; }
    .student {
      width: 50px; height: 100px; background: blue;
      position: absolute; bottom: 0; left: 20px;
      animation: walk 12s linear forwards;
    }
    .school {
      position: absolute; left: 20px; bottom: 0;
      width: 100px; height: 100px; background: brown;
    }
    .home {
      position: absolute; right: 20px; bottom: 0;
      width: 100px; height: 100px; background: green;
    }
    .narration {
      position: absolute; top: 10px; width: 100%;
      text-align: center; font-size: 20px; font-family: sans-serif;
      color: white; text-shadow: 2px 2px 4px black;
    }
    @keyframes walk {
      from { left: 20px; }
      to { left: 80%; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="narration" id="text">The student leaves school...</div>
    <div class="student"></div>
    <div class="school"></div>
    <div class="home"></div>
  </div>

  <script>
    // Change narration text as the student walks
    setTimeout(() => {
      document.getElementById("text").innerText = "Walking along the road...";
    }, 4000);

    setTimeout(() => {
      document.getElementById("text").innerText = "Finally, reaching home!";
    }, 9000);

    setTimeout(() => {
      alert("The student has reached home!");
    }, 12000);
  </script>
</body>
</html>
